<!DOCTYPE html>
<html>
<head>
    <title>ID vs Class</title>
    <style>
        #unique {
            color: red;
        }

        .common {
            color: blue;
        }
    </style>
</head>
<body>

<p id="unique">This uses ID (unique)</p>

<p class="common">This uses class</p>
<p class="common">Another element with same class</p>

</body>
</html>
