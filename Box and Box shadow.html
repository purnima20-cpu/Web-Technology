<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Box with Shadow</title>  
    <style>  
        .box {  
            width: 300px;  
            height: 200px;   
            background-color: #f0f0f0;   
            margin: 50px auto;   
   padding: 20px;   
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);   
            border-radius: 10px;   
        }  
        .content {  
            text-align: center;   
            font-size: 24px;   
            color: #333;  
        }  
    </style>  
</head>  
<body>  
    <div class="box">  
        <div class="content">This is a box with a shadow</div>  
    </div>  
</body>  
</html>
