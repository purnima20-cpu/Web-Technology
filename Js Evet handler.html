<!DOCTYPE html>   
<html lang="en">   
<head>   
<meta charset="UTF-8" />   
<title>Event Handling Example</title>   
</head>   
<body>   
<h2>Click the Button</h2>   
<button onclick="handleButtonClick()">   Click to trigger event handler function</button>   
<script>   
function handleButtonClick() {   
alert("triggerred after you clicked the button");   
}   
</script>   
</body>   
</html>
