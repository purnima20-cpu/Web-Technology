<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Form Validation</title>  
    <style>  
        .error {  
            color: red;  
            font-size: 14px;  
        }  
    </style>  
</head>  
<body>  
    <h2>Form Validation Example</h2>  
    <form id="myForm" onsubmit="return validateForm()">  
        <label for="name">Name:</label><br>  
        <input type="text" id="name" name="name"><br>  
        <span id="nameError" class="error"></span><br>  
        <label for="email">Email:</label><br>  
        <input type="text" id="email" name="email"><br>  
        <span id="emailError" class="error"></span><br>  
        <label for="age">Age:</label><br>  
        <input type="text" id="age" name="age"><br>  
        <span id="ageError" class="error"></span><br>  
    <input type="submit" value="Submit">  
    </form>  
    <script>  
        function validateForm() {  
            document.getElementById('nameError').innerHTML = '';  
            document.getElementById('emailError').innerHTML = '';  
            document.getElementById('ageError').innerHTML = '';  
            let name = document.getElementById('name').value;  
            let email = document.getElementById('email').value;  
            let age = document.getElementById('age').value;  
            let isValid = true;  
            if (name === "") {  
                document.getElementById('nameError').innerHTML = "Name is required";  
                isValid = false;  
            }  
            const emailPattern = /^[a-zA-Z0-9._-]+@[a-zA-Z0-9.-]+\.[a-zAZ]{2,6}$/;  
            if (email === "") {  
                document.getElementById('emailError').innerHTML = "Email is required";  
                isValid = false;  
            } else if (!emailPattern.test(email)) {  
                document.getElementById('emailError').innerHTML = "Invalid email format";  
                isValid = false;  
            }  
            if (age === "") {  
                document.getElementById('ageError').innerHTML = "Age is required";  
                isValid = false;  
 } else if (isNaN(age) || age <= 0) {  
                document.getElementById('ageError').innerHTML = "Please enter a valid age";  
                isValid = false;  
            }  
            return isValid;  
        }  
    </script>  
</body>  
</html>
