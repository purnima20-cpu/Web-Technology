<!DOCTYPE html>
<html>
<head>
    <title>Semantic Layout</title>
    <style>
        header, nav, section, aside, footer {
            border: 1px solid black;
            padding: 10px;
            margin: 5px;
        }
    </style>
</head>
<body>

<header>
    <h1>Website Header</h1>
</header>

<nav>
    Navigation Menu
</nav>

<section>
    Main Content Area
</section>

<aside>
    Sidebar Content
</aside>

<footer>
    Footer Information
</footer>

</body>
</html>
