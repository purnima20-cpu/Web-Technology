<!DOCTYPE html>   
<html lang="en">   
<head>   
<meta charset="UTF-8">   
<meta name="viewport" content="width=device-width, initial-scale=1.0">   
<title>Padding and Margin</title>   
<style>   
    .my-div{   
        border: 2px solid black;  
        margin:40px;   
        padding:20px;   
        height: 150px;   
        width: 150px;   
        background-color: blue;   
    }   
    .my-div p{ 
        color: white; 
    } 
</style>   
</head>   
<body>   
    <div class="my-div"><p>Purnima Bohara</p> 
    </div>   
   </body>   
</html>
