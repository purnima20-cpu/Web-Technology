<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Double Equals (==) in JavaScript</title>  
</head>  
<body>  
<h1>Double Equals (==) Operator Example</h1>  
<p id="result"></p> 
<script>  
    let num = 5;  
    let str = '5';  
    if (num == str) {  
        document.getElementById("result").textContent = "The values are equal!";  
    } else {  
        document.getElementById("result").textContent = "The values are not  equal!"; 
    }  
</script>  
</body>  
</html>
