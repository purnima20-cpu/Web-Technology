<!DOCTYPE html>
<html>
<head>
    <title>Table Example</title>
</head>
<body>

<table border="1">
    <thead>
        <tr>
            <th colspan="3">Student Marks</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td rowspan="2">Ram</td>
            <td>Math</td>
            <td>90</td>
        </tr>
        <tr>
            <td>Science</td>
            <td>85</td>
        </tr>
    </tbody>

    <tfoot>
        <tr>
            <td colspan="3">End of Table</td>
        </tr>
    </tfoot>
</table>

</body>
</html>
