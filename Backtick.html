<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
      <title>JavaScript String Variables</title>  
</head>  
<body>  
    <h1>String Variables in JavaScript</h1>  
    <p id="double-quotes"></p>  
    <p id="single-quotes"></p>  
    <p id="template-literals"></p>  
    <script>  
        let string1 = "This is a string using double quotes.";  
        document.getElementById("double-quotes").textContent = string1; 
        let string2 = 'This is a string using single quotes.';  
        document.getElementById("single-quotes").textContent = string2;  
        let name = "Bhumika"; 
        let string3 = `This is a string using template literals. Hello,  
${name}!`;  
        document.getElementById("template-literals").textContent = string3;  
    </script>  
</body>  
</html>
