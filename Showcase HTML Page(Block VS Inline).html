<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Block vs Inline Elements Showcase</title>
    <style>
      body {
        font-family: Arial, sans-serif;
      }
      .box {
        border: 2px solid black;
        padding: 10px;
        margin: 10px 0;
        background-color: #f2f2f2;
      }
      span {
        color: red;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Block and Inline Elements Demonstration</h1>

    <!-- BLOCK ELEMENTS -->
    <h2>Block Elements</h2>

    <div class="box">This is a &lt;div&gt; element (block level).</div>

    <p class="box">This is a &lt;p&gt; paragraph (block level).</p>

    <h3 class="box">This is a heading (block level)</h3>

    <ul class="box">
      <li>Item 1</li>
      <li>Item 2</li>
    </ul>

    <hr />

    <!-- INLINE ELEMENTS -->
    <h2>Inline Elements</h2>

    <p>
      This is an example of
      <span>&lt;span&gt;</span>, <b>&lt;b&gt;</b>, <i>&lt;i&gt;</i>,
      <a href="#">&lt;a&gt;</a>, and
      <strong>&lt;strong&gt;</strong>
      inline elements.
    </p>
  </body>
</html>
