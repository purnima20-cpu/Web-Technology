<!DOCTYPE html>   
<html lang="en">   
<head>   
  <meta charset="UTF-8">   
  <meta name="viewport" content="width=device-width, initial-scale=1.0">   
  <style>   
    .circle {   
      width: 50px;   
      height: 50px;   
      background-color: lightblue;   
      border-radius: 50%;   
      animation: resizeCircle 2s infinite alternate;    
      display: flex;   
      align-items: center;   
      justify-content: center;   
      text-align: center;   
    }  
   @keyframes resizeCircle {   
      to {   
        width: 100px;    
        height: 100px;    
      }   
    }   
  </style>   
<title>Resizable Circle Animation</title>  
</head>   
<body>   
<div class="circle">Purnima</div>   
</body>   
</html>
