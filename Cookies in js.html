<!DOCTYPE html>   
<html lang="en">   
<head>   
<meta charset="UTF-8">   
<meta name="viewport" content="width=device-width, initial-scale=1.0">   
<title>Cookie Example</title>   

<script>   
// Cookie set गर्ने function
function setCookie(name, value, days) {   
  const expires = new Date();   
  expires.setTime(expires.getTime() + days * 24 * 60 * 60 * 1000);   
  document.cookie = `${name}=${value};expires=${expires.toUTCString()};path=/`;   
}   

// Cookie get गर्ने function
function getCookie(name) {   
  const cookieName = `${name}=`;   
  const decodedCookie = decodeURIComponent(document.cookie);   
  const cookieArray = decodedCookie.split(';');   
  for (let i = 0; i < cookieArray.length; i++) {   
    let cookie = cookieArray[i].trim();   
    if (cookie.indexOf(cookieName) === 0) {   
      return cookie.substring(cookieName.length, cookie.length);   
    }   
  }   
  return null;   
}   

// पुरानो cookie set (पहिलो line)
setCookie("username", "Purnima Bohara",7); 
console.log(getCookie("username"));  // यसले देखाउँछ Purnima Bohara

// नयाँ cookie set (दोश्रो line)
setCookie("status", "Live reloaded",7);
console.log(getCookie("status"));    // यसले देखाउँछ Live reloaded

</script>   

</head>   
<body>   
<h1>Cookie Example</h1>   
<p>Check the console for the retrieved cookie values.</p>   
</body>   
</html>
