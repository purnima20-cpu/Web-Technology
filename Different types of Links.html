<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Types of Links Example</title>
  </head>
  <body>
    <h1>Link Demonstration Page</h1>

    <!-- Navigation Section -->
    <h2>Navigation Links</h2>

    <!-- 1. Link to another page in same project -->
    <p>
      <a href="about.html">Go to About Page (Same Project)</a>
    </p>

    <!-- 2. External Website Link -->
    <p>
      <a href="https://www.google.com" target="_blank">
        Visit Google (External Website)
      </a>
    </p>

    <!-- 3. Internal Link within same page -->
    <p>
      <a href="#contact">Go to Contact Section (Internal Link)</a>
    </p>

    <hr />

    <!-- Some Content -->
    <h2>Home Section</h2>
    <p>This is the home section of the page.</p>

    <br /><br /><br /><br /><br /><br />

    <!-- Contact Section (Internal Target) -->
    <h2 id="contact">Contact Section</h2>
    <p>This is the contact section. You jumped here using an internal link.</p>
  </body>
</html>
