<!DOCTYPE html>   
<html lang="en">   
<head>   
  <meta charset="UTF-8">   
  <meta name="viewport" content="width=device-width, initial-scale=1.0">   
  <style>   
    body {   
      font-family: Arial, sans-serif;   
      margin: 20px;   
      text-align: center;   
    }   
    h1 {   
      color: #3498db;  
          }   
    p {   
      line-height: 1.6;   
    }   
    /* Mobile Styles */   
    @media screen and (max-width: 767px) {   
      h1 {   
        font-size: 24px;   
      }   
      p {   
        font-size: 16px;   
      }   
    }   
    /* Desktop Styles */   
    @media screen and (min-width: 768px) {   
      h1 {   
        font-size: 36px;   
      }   
      p {   
        font-size: 18px;   
      }   
    }   
  </style>   
  <title>Responsive Web Page</title>   
</head>   
<body>  
     <h1>Responsive Web Page</h1>   
  <p>This is a simple example of a responsive web page using media queries.</p>   
</body>   
</html>
